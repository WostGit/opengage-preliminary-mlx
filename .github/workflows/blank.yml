name: OpenSage Preliminary Testing with Qwen2-0.5B on MLX - Ultra Verbose

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  preliminary-testing:
    runs-on: macos-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache MLX model and pip packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/Library/Caches/pip
            /Users/runner/.mlx
          key: ${{ runner.os }}-mlx-qwen2-0.5b-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-mlx-qwen2-0.5b-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlx mlx-lm pytest

      - name: Create ULTRA VERBOSE test script
        run: |
          cat > test_opensage_preliminary.py << 'EOF'
          import pytest
          from mlx_lm import load, generate
          import json
          import re
          import sys

          print("="*100)
          print("🚀 OPEN SAGE PRELIMINARY TESTS - ULTRA VERBOSE MODE")
          print("Model: Qwen2-0.5B-Instruct-MLX")
          print("="*100)

          @pytest.fixture(scope="session")
          def model_and_tokenizer():
              print("📥 Loading model...")
              model, tokenizer = load("Qwen/Qwen2-0.5B-Instruct-MLX", 
                                    tokenizer_config={"eos_token": "<|im_end|>"})
              print("✅ Model loaded successfully\n")
              return model, tokenizer

          def clean_generated_code(raw: str) -> str:
              print("🧹 RAW LLM OUTPUT:")
              print(raw)
              print("-" * 80)
              code = re.sub(r'```(?:python|json)?\s*\n?(.*?)\n?```', r'\1', raw, flags=re.DOTALL | re.IGNORECASE)
              code = re.sub(r'^`+|`+$', '', code, flags=re.MULTILINE).strip()
              code = re.sub(r'^(?:Here is the code|The following code|```).*?\n', '', code, flags=re.IGNORECASE | re.DOTALL).strip()
              print("✅ CLEANED CODE:")
              print(code)
              print("-" * 80)
              return code

          def llm_generate(model, tokenizer, prompt, max_tokens=512, test_name=""):
              print(f"\n🔍 [{test_name.upper()}] SENDING PROMPT TO LLM:")
              print(prompt)
              print("-" * 60)

              messages = [
                  {"role": "system", "content": "You are a precise code generation assistant. Output ONLY valid Python code or valid JSON. Never use markdown, backticks, code blocks, or any explanations."},
                  {"role": "user", "content": prompt}
              ]
              text = tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)

              response = generate(model, tokenizer, prompt=text, max_tokens=max_tokens, verbose=False)
              cleaned = re.sub(r'<\|im_end\|>.*', '', response).strip()

              print("📤 LLM RAW RESPONSE:")
              print(cleaned)
              print("="*80)
              return cleaned

          # ====================== TESTS ======================

          def test_dynamic_tool_synthesis(model_and_tokenizer):
              print("\n" + "═"*100)
              print("🧪 TEST 1: DYNAMIC TOOL SYNTHESIS")
              model, tokenizer = model_and_tokenizer
              prompt = "Output ONLY the Python code (no markdown, no backticks, no explanations) for a function named 'add' that takes two integers a and b and returns their sum."
              raw = llm_generate(model, tokenizer, prompt, 200, "Dynamic Tool Synthesis")
              code = clean_generated_code(raw)
              local = {}
              exec(code, local)
              assert 'add' in local
              print(f"✅ add(5,7) = {local['add'](5,7)}")

          def test_tool_execution(model_and_tokenizer):
              print("\n" + "═"*100)
              print("🧪 TEST 2: TOOL EXECUTION")
              model, tokenizer = model_and_tokenizer
              prompt = "Output ONLY the Python code (no markdown, no backticks, no explanations) for a function named 'multiply' that takes two numbers a and b and returns their product."
              raw = llm_generate(model, tokenizer, prompt, test_name="Tool Execution")
              code = clean_generated_code(raw)
              local = {}
              exec(code, local)
              assert 'multiply' in local
              print(f"✅ multiply(3,4) = {local['multiply'](3,4)}")

          def test_vertical_topology(model_and_tokenizer):
              print("\n" + "═"*100)
              print("🧪 TEST 3: VERTICAL TOPOLOGY")
              model, tokenizer = model_and_tokenizer
              prompt = 'For the task "Calculate sum of 10 and 20", decide the topology. Output ONLY valid JSON.'
              raw = llm_generate(model, tokenizer, prompt, 150, "Vertical Topology")
              print(f"Raw decision: {raw}")

          def test_hierarchical_memory(model_and_tokenizer):
              print("\n" + "═"*100)
              print("🧪 TEST 4: HIERARCHICAL MEMORY")
              model, tokenizer = model_and_tokenizer
              prompt = "Summarize this in one short sentence: Simulate OpenSage tool synthesis with Qwen2."
              summary = llm_generate(model, tokenizer, prompt, 80, "Memory Test")
              print(f"Memory stored: {summary}")

          def test_failure_case(model_and_tokenizer):
              print("\n" + "═"*100)
              print("🧪 TEST 5: FAILURE CASE")
              model, tokenizer = model_and_tokenizer
              prompt = "Output ONLY Python code for function 'broken' that raises ZeroDivisionError when called."
              raw = llm_generate(model, tokenizer, prompt, test_name="Failure Case")
              code = clean_generated_code(raw)
              local = {}
              exec(code, local)
              with pytest.raises(Exception) as e:
                  local['broken']()
              print(f"✅ Correctly raised: {type(e.value).__name__}")

          def test_mini_opensage_loop(model_and_tokenizer):
              print("\n" + "═"*100)
              print("🧪 TEST 6: MINI OPEN SAGE LOOP")
              model, tokenizer = model_and_tokenizer
              prompt = """Simulate one OpenSage step for "find max in [1,5,3]". Output ONLY JSON {"topology": "...", "tool_code": "..."}"""
              raw = llm_generate(model, tokenizer, prompt, 400, "Mini OpenSage Loop")
              print("Mini loop completed.")

          if __name__ == "__main__":
              pytest.main([__file__, "-q", "-s", "--tb=no"])
          EOF

      - name: Run Ultra Verbose Tests
        run: python -m pytest test_opensage_preliminary.py -q -s --tb=no

      - name: Final Summary
        if: always()
        run: |
          echo "🎉 ULTRA VERBOSE RUN COMPLETED"
          echo "All prints should now be visible thanks to -s flag"
