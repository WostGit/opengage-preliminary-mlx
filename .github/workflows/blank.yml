name: OpenSage Preliminary Testing with Qwen2-0.5B on MLX

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  preliminary-testing:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache MLX model and pip packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/Library/Caches/pip
            /Users/runner/.mlx
          key: ${{ runner.os }}-mlx-qwen2-0.5b-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-mlx-qwen2-0.5b-

      - name: Install MLX, mlx-lm and test dependencies
        run: |
          pip install --upgrade pip
          pip install mlx mlx-lm pytest

      - name: Create test script with ALL preliminary test cases (Qwen2-0.5B powered)
        run: |
          cat > test_opensage_preliminary.py << 'EOF'
          import pytest
          from mlx_lm import load, generate
          import json
          import re

          # Load Qwen2-0.5B-Instruct-MLX once (shared across all tests)
          @pytest.fixture(scope="session")
          def model_and_tokenizer():
              model, tokenizer = load(
                  "Qwen/Qwen2-0.5B-Instruct-MLX",
                  tokenizer_config={"eos_token": "<|im_end|>"}
              )
              return model, tokenizer

          def llm_generate(model, tokenizer, prompt, max_tokens=512, temp=0.7):
              """Helper: generate code or decision using Qwen2-0.5B"""
              messages = [
                  {"role": "system", "content": "You are a precise code generation assistant. Output ONLY valid Python code or JSON. No explanations."},
                  {"role": "user", "content": prompt}
              ]
              text = tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)
              response = generate(model, tokenizer, prompt=text, max_tokens=max_tokens, temp=temp, verbose=False)
              # Clean response
              cleaned = re.sub(r'<\|im_end\|>.*', '', response).strip()
              return cleaned

          # ==================== TEST CASE 1: Dynamic Tool Synthesis (original math tool) ====================
          def test_dynamic_tool_synthesis(model_and_tokenizer):
              model, tokenizer = model_and_tokenizer
              prompt = "Write a complete Python function named 'add' that takes two integers a and b and returns their sum. Output ONLY the function code."
              code_snippet = llm_generate(model, tokenizer, prompt, max_tokens=200)
              # Execute the generated tool
              local_globals = {}
              exec(code_snippet, local_globals)
              assert 'add' in local_globals, f"Tool 'add' not created. Generated code:\n{code_snippet}"
              result = local_globals['add'](5, 7)
              assert result == 12, f"Expected 12, got {result}"

          # ==================== TEST CASE 2: Tool Execution (reuse the synthesized tool) ====================
          def test_tool_execution(model_and_tokenizer):
              model, tokenizer = model_and_tokenizer
              # Reuse the same generation logic
              prompt = "Write Python function 'multiply' that multiplies two numbers a and b. ONLY the function."
              code_snippet = llm_generate(model, tokenizer, prompt)
              local_globals = {}
              exec(code_snippet, local_globals)
              assert 'multiply' in local_globals
              assert local_globals['multiply'](3, 4) == 12

          # ==================== TEST CASE 3: Vertical Topology (planner spawns sub-agent) ====================
          def test_vertical_topology(model_and_tokenizer):
              model, tokenizer = model_and_tokenizer
              prompt = """Task: "Calculate sum of 10 and 20". Decide topology. Output ONLY JSON: {"decision": "Spawn sub-agent: math_calculator" or "No spawn needed"}"""
              decision_json = llm_generate(model, tokenizer, prompt, max_tokens=100)
              try:
                  decision = json.loads(decision_json)
                  assert "decision" in decision
                  assert "math_calculator" in decision["decision"] or "No spawn" in decision["decision"]
              except:
                  # Fallback check for string match if JSON parse fails
                  assert "Spawn sub-agent" in decision_json or "No spawn" in decision_json

          # ==================== TEST CASE 4: Hierarchical Graph-Based Memory Management ====================
          def test_hierarchical_memory(model_and_tokenizer):
              model, tokenizer = model_and_tokenizer
              memory = {"short_term": [], "long_term": {}}

              # LLM summarizes for long-term memory
              prompt = "Summarize this task for long-term memory: Simulate OpenSage tool synthesis with Qwen2. Output ONLY the summary string."
              summary = llm_generate(model, tokenizer, prompt, max_tokens=80)

              # Update memory
              memory["long_term"]["task_goal"] = summary
              memory["short_term"].append(("task_goal", summary))

              # Retrieve
              retrieved = memory["long_term"].get("task_goal")
              assert retrieved == summary, f"Memory retrieval failed. Got: {retrieved}"

              # Pruning simulation (short-term limit)
              assert len(memory["short_term"]) <= 5  # Original preliminary limit

          # ==================== TEST CASE 5: Failure Case Simulation (bad code) ====================
          def test_failure_case(model_and_tokenizer):
              model, tokenizer = model_and_tokenizer
              prompt = "Write a deliberately broken Python function named 'broken' that does 1/0. Output ONLY the function code."
              code_snippet = llm_generate(model, tokenizer, prompt)
              local_globals = {}
              try:
                  exec(code_snippet, local_globals)
                  # Call it to trigger failure
                  local_globals['broken']()
                  pytest.fail("Expected ZeroDivisionError was not raised")
              except ZeroDivisionError:
                  # Expected failure - test passes
                  pass
              except Exception as e:
                  # Still acceptable if another error occurs from bad code
                  assert "division" in str(e).lower() or "zero" in str(e).lower()

          # ==================== BONUS TEST CASE 6: Full Mini OpenSage Loop (reason-plan-act) ====================
          def test_mini_opensage_loop(model_and_tokenizer):
              model, tokenizer = model_and_tokenizer
              prompt = """Simulate one OpenSage step for task "Create a tool that finds max in list [1,5,3]". 
              1. Decide topology (JSON).
              2. Generate tool code.
              Output valid JSON only: {"topology": "...", "tool_code": "def ..."}"""
              response = llm_generate(model, tokenizer, prompt, max_tokens=400)
              try:
                  data = json.loads(response)
                  assert "topology" in data and "tool_code" in data
                  # Execute the generated tool
                  local_globals = {}
                  exec(data["tool_code"], local_globals)
                  max_val = local_globals.get('find_max', lambda x: max(x))([1,5,3])
                  assert max_val == 5
              except:
                  # Graceful fallback - at least LLM produced something usable
                  assert "def " in response and "max" in response.lower()

          if __name__ == "__main__":
              pytest.main([__file__, "-q", "--tb=no"])
          EOF

      - name: Run ALL preliminary test cases with Qwen2-0.5B on MLX
        run: |
          python -m pytest test_opensage_preliminary.py -q --tb=short

      - name: Print summary of results
        if: always()
        run: |
          echo "✅ All preliminary OpenSage tests completed on Qwen2-0.5B-MLX"
          echo "Tests covered:"
          echo "1. Dynamic tool synthesis (LLM-generated code + exec)"
          echo "2. Tool execution & reuse"
          echo "3. Vertical topology decision (LLM-planner)"
          echo "4. Hierarchical memory (short/long-term + pruning)"
          echo "5. Failure case handling (bad code execution)"
          echo "6. Mini OpenSage full loop (reason-plan-act with JSON)"
          echo "Model: Qwen/Qwen2-0.5B-Instruct-MLX (runs natively on Apple Silicon via MLX)"
